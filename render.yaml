services:
  - type: web
    name: logix-backend
    env: php
    branch: main
    plan: starter
    region: oregon
    root: backend
    buildCommand: composer install --no-dev --optimize-autoloader && php artisan key:generate --force
    # NOTA: el servicio real en Render está desplegado con DOCKER, así que este
    # startCommand no aplica. El arranque vive en backend/docker/start.sh
    # (CMD del Dockerfile): migra + siembra + worker de correos + Apache.
    startCommand: php artisan serve --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: 'false'
      - key: APP_URL
        value: https://<YOUR_BACKEND_DOMAIN>
      # PostgreSQL administrado de Render: crea la BD en el dashboard y define
      # DB_HOST, DB_PORT, DB_DATABASE, DB_USERNAME y DB_PASSWORD como secretos.
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: '5432'
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: public
      # --- Almacenamiento de imágenes (fotos de perfil, logo del negocio) ---
      # El disco local de Render es efímero (se borra en cada deploy/reinicio),
      # así que las fotos/logos se guardan en S3 (o un proveedor S3-compatible:
      # Cloudflare R2, Backblaze B2, DigitalOcean Spaces, etc.) cuando estas
      # variables están definidas; si se dejan vacías, el código cae de vuelta
      # al disco local 'public' (las imágenes volverán a romperse en cada deploy).
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_DEFAULT_REGION
        sync: false
      - key: AWS_BUCKET
        sync: false
      # Solo si el proveedor NO es AWS (R2, Backblaze, Spaces...): la URL del endpoint S3.
      - key: AWS_ENDPOINT
        sync: false
      # Solo si el proveedor NO es AWS: casi siempre 'true' para R2/Backblaze/MinIO.
      - key: AWS_USE_PATH_STYLE_ENDPOINT
        value: 'false'
      # URL pública base para servir los archivos (dominio del bucket o CDN delante de él).
      - key: AWS_URL
        sync: false
      # --- Correo transaccional (envio de facturas) ---
      # MAIL_USERNAME y MAIL_PASSWORD se configuran como secretos en el dashboard de Render.
      # Ejemplos: Gmail (smtp.gmail.com:587 + App Password) o Brevo (smtp-relay.brevo.com:587).
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: '587'
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        sync: false
      - key: MAIL_FROM_NAME
        value: Logix POS
      # --- Pasarela de pagos Wompi (PSE, Nequi, tarjetas) ---
      # Llaves del comercio en comercios.wompi.co; se configuran como secretos.
      - key: WOMPI_PUBLIC_KEY
        sync: false
      - key: WOMPI_INTEGRITY_SECRET
        sync: false
      - key: WOMPI_EVENTS_SECRET
        sync: false
      - key: WOMPI_REDIRECT_URL
        sync: false
