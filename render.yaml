services:
  - type: web
    name: logix-backend
    env: php
    branch: main
    plan: starter
    region: oregon
    root: backend
    buildCommand: composer install --no-dev --optimize-autoloader && php artisan key:generate --force
    # Migra y siembra la BD automáticamente en cada deploy antes de arrancar el servidor.
    # Los seeders son idempotentes (updateOrCreate): roles, planes, módulos, tipos de negocio, super-admin.
    # El queue:work en segundo plano procesa los correos encolados (facturas, recibos)
    # para que las peticiones HTTP no esperen al SMTP (evita 502 en Render).
    startCommand: php artisan migrate --force && php artisan db:seed --force && (php artisan queue:work --sleep=3 --tries=3 --timeout=60 &) && php artisan serve --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: 'false'
      - key: APP_URL
        value: https://<YOUR_BACKEND_DOMAIN>
      # PostgreSQL administrado de Render: crea la BD en el dashboard y define
      # DB_HOST, DB_PORT, DB_DATABASE, DB_USERNAME y DB_PASSWORD como secretos.
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: '5432'
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: public
      # --- Correo transaccional (envio de facturas) ---
      # MAIL_USERNAME y MAIL_PASSWORD se configuran como secretos en el dashboard de Render.
      # Ejemplos: Gmail (smtp.gmail.com:587 + App Password) o Brevo (smtp-relay.brevo.com:587).
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: '587'
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        sync: false
      - key: MAIL_FROM_NAME
        value: Logix POS
      # --- Pasarela de pagos Wompi (PSE, Nequi, tarjetas) ---
      # Llaves del comercio en comercios.wompi.co; se configuran como secretos.
      - key: WOMPI_PUBLIC_KEY
        sync: false
      - key: WOMPI_INTEGRITY_SECRET
        sync: false
      - key: WOMPI_EVENTS_SECRET
        sync: false
      - key: WOMPI_REDIRECT_URL
        sync: false
